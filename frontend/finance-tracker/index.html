<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1sh3I52WFTUbvX-19WI1u400uuiZ9vgS8"
    crossorigin="anonymous" />
  <link rel="preload" as="image" href="https://lh3.googleusercontent.com/d/1sh3I52WFTUbvX-19WI1u400uuiZ9vgS8"
    fetchpriority="high" />
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1sh3I52WFTUbvX-19WI1u400uuiZ9vgS8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinRace" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description"
    content="FinRace - AI Powered Personal Finance Tracker. Manage your income and expenses with ease." />

  <!-- Critical Path Optimization: Preconnect to external font origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Performance: Load fonts early to avoid layout shift and blocking imports in CSS -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Caveat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap"
    rel="stylesheet">

  <title>FinRace</title>

  <!-- Prevent white flash on reload: Force dark mode background immediately -->
  <style>
    html {
      background-color: #0f172a;
      /* Matches --color-bg in dark mode */
    }
  </style>

  <script>
    // Immediately apply dark class to prevent flash
    document.documentElement.classList.add('dark');
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
